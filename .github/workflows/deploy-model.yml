name: deploy-model.yml
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build By Docker
        run: |
          docker buildx build --platform linux/amd64 -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-model:latest --load .
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      
      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-model:latest  

      - name: Deploy to EC2 By Docker-Compose
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # move to project directory
            cd /home/ubuntu/app

            # pull the latest image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ai-model:latest

            # update ai-model image
            docker-compose up -d --no-deps ai-model

            # remove unused images
            docker image prune -f